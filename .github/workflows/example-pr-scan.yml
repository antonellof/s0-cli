# Example workflow consumers can copy into their repo as
# `.github/workflows/s0-scan.yml`.
#
# Scans the diff on every PR + the full repo nightly, and pushes findings into
# GitHub code scanning so they show up in the PR's "Security" tab.
name: s0-cli scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Nightly full-repo scan at 03:17 UTC.
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for diff mode against the PR base

      - uses: ./  # In a consumer repo, replace with: your-org/s0-cli@v0
        with:
          mode: ${{ github.event_name == 'pull_request' && 'diff' || 'repo' }}
          fail-on: high
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
