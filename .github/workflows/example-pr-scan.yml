# Self-scan: dogfoods the action against this repo on every PR + push to main.
#
# Runs in --no-llm mode so it's free and needs no secrets — sufficient to
# prove the deterministic-scanner pipeline + SARIF upload work end-to-end.
# Consumers who want full LLM triage should copy the snippet from README.md
# (which sets `openai-api-key: ${{ secrets.OPENAI_API_KEY }}` and drops
# `no-llm`) into their own `.github/workflows/s0-scan.yml`.

name: s0-cli scan

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for diff mode against the PR base

      - uses: ./
        with:
          mode: ${{ github.event_name == 'pull_request' && 'diff' || 'repo' }}
          fail-on: critical  # don't fail PRs on existing medium-severity findings
          no-llm: "true"
