name: Release standalone binaries

# Triggered when a `vX.Y.Z` tag is pushed. Builds a single-file
# `s0` executable on each platform with PyInstaller (see `pyinstaller.spec`)
# and attaches it to the matching GitHub release.
#
# Manual run via `workflow_dispatch` is also supported for testing the
# matrix without cutting a release; in that case nothing gets attached
# to a release, but each platform's binary is uploaded as a workflow
# artifact you can download from the run page.

on:
  push:
    tags:
      # Match semver tags only (`v1.2.3`, `v1.2.3-rc1`) so that the
      # floating "latest major" tags we re-point on every release —
      # `v0`, `v1`, … — do not double-fire this expensive 5-platform
      # build. The release the binaries get attached to is always the
      # semver one anyway.
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: write  # needed to attach assets to the release

jobs:
  build:
    name: ${{ matrix.asset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon
            asset: s0-macos-arm64
          - os: macos-13            # Intel
            asset: s0-macos-x86_64
          - os: ubuntu-22.04
            asset: s0-linux-x86_64
          - os: ubuntu-22.04-arm    # GitHub-hosted arm64 runner
            asset: s0-linux-arm64
          - os: windows-latest
            asset: s0-windows-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install build deps
        run: uv sync --extra build

      - name: Build binary
        run: uv run pyinstaller pyinstaller.spec --clean --noconfirm

      # The spec produces a `dist/s0/` folder (onedir mode) containing the
      # `s0` executable + its sibling shared libraries / data files.
      # onedir is ~30x faster to start than `--onefile` because there's
      # no per-invocation extraction step. We package the folder into a
      # single tarball (or zip on Windows) so users still download one file.
      - name: Smoke-test the binary
        shell: bash
        run: |
          set -eux
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            ./dist/s0/s0.exe version
            ./dist/s0/s0.exe scanners
            ./dist/s0/s0.exe doctor || true
          else
            ./dist/s0/s0 version
            ./dist/s0/s0 scanners
            ./dist/s0/s0 doctor || true
          fi

      - name: Package
        shell: bash
        id: pkg
        run: |
          set -eux
          mkdir -p artifacts
          # Rename the staging dir to match the asset name so the unpacked
          # folder also identifies its platform.
          mv dist/s0 "dist/${{ matrix.asset }}"
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            archive="${{ matrix.asset }}.zip"
            (cd dist && 7z a -tzip "../artifacts/${archive}" "${{ matrix.asset }}")
          else
            archive="${{ matrix.asset }}.tar.gz"
            tar -czf "artifacts/${archive}" -C dist "${{ matrix.asset }}"
          fi
          cd artifacts
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${archive}" > "${archive}.sha256"
          else
            shasum -a 256 "${archive}" > "${archive}.sha256"
          fi
          cat "${archive}.sha256"
          echo "archive=${archive}" >> "$GITHUB_OUTPUT"

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            artifacts/${{ steps.pkg.outputs.archive }}
            artifacts/${{ steps.pkg.outputs.archive }}.sha256
          if-no-files-found: error

      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ steps.pkg.outputs.archive }}
            artifacts/${{ steps.pkg.outputs.archive }}.sha256
          fail_on_unmatched_files: true
