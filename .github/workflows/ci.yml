name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync deps
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Tests (no LLM)
        env:
          S0_MODEL: anthropic/claude-sonnet-4-5
        run: uv run pytest -q

      - name: Doctor
        run: uv run s0 doctor || true
